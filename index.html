<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --snake-head: #3fb950;
      --snake-body: #238636;
      --food: #f78166;
      --food-glow: rgba(247,129,102,0.4);
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 16px;
      user-select: none;
    }

    header {
      text-align: center;
    }

    header h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--snake-head);
    }

    .scoreboard {
      display: flex;
      gap: 24px;
      justify-content: center;
    }

    .score-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 20px;
      text-align: center;
    }

    .score-box .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .score-box .value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .arena-wrap {
      position: relative;
    }

    canvas {
      display: block;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    /* Overlay (start / game-over) */
    .overlay {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: rgba(13,17,23,0.88);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.25s;
    }

    .overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay h2 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
    }

    .overlay .final-score {
      font-size: 1rem;
      color: var(--muted);
    }

    .overlay .final-score span {
      color: var(--food);
      font-weight: 700;
    }

    .btn {
      background: var(--snake-head);
      color: #0d1117;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:hover { background: #56d364; }
    .btn:active { transform: scale(0.97); }

    /* D-pad for mobile */
    .dpad {
      display: none;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(3, 52px);
      gap: 4px;
    }

    @media (pointer: coarse) {
      .dpad { display: grid; }
    }

    .dpad-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .dpad-btn:active { background: var(--border); color: var(--text); }
    .dpad-btn.empty { background: transparent; border-color: transparent; pointer-events: none; }

    .hint {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>Snake</h1>
</header>

<div class="scoreboard">
  <div class="score-box">
    <div class="label">Score</div>
    <div class="value" id="score">0</div>
  </div>
  <div class="score-box">
    <div class="label">Best</div>
    <div class="value" id="best">0</div>
  </div>
  <div class="score-box">
    <div class="label">Level</div>
    <div class="value" id="level">1</div>
  </div>
</div>

<div class="arena-wrap">
  <canvas id="c"></canvas>

  <div class="overlay" id="overlay">
    <h2 id="overlay-title">Snake</h2>
    <p class="final-score" id="overlay-msg">Use arrow keys or WASD to move</p>
    <button class="btn" id="overlay-btn">Play</button>
  </div>
</div>

<div class="dpad">
  <div class="dpad-btn empty"></div>
  <button class="dpad-btn" id="btn-up">▲</button>
  <div class="dpad-btn empty"></div>
  <button class="dpad-btn" id="btn-left">◀</button>
  <div class="dpad-btn empty"></div>
  <button class="dpad-btn" id="btn-right">▶</button>
  <div class="dpad-btn empty"></div>
  <button class="dpad-btn" id="btn-down">▼</button>
  <div class="dpad-btn empty"></div>
</div>

<p class="hint">Arrow keys · WASD · or tap the D-pad</p>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  const COLS = 25, ROWS = 25, CELL = 22;
  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;

  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const levelEl = document.getElementById('level');
  const overlay    = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlayMsg = document.getElementById('overlay-msg');
  const overlayBtn = document.getElementById('overlay-btn');

  let snake, dir, nextDir, food, score, best, level, speed, loop, running, particles;

  function init() {
    snake = [
      { x: 12, y: 12 },
      { x: 11, y: 12 },
      { x: 10, y: 12 },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    level = 1;
    speed = 150;
    particles = [];
    placeFood();
    updateHUD();
  }

  function placeFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
    food.pulse = 0;
  }

  function updateHUD() {
    scoreEl.textContent = score;
    bestEl.textContent  = best || 0;
    levelEl.textContent = level;
  }

  function setDir(dx, dy) {
    if (dx === -dir.x && dy === -dir.y) return; // no 180
    nextDir = { x: dx, y: dy };
  }

  // --- Particles ---
  function spawnParticles(x, y) {
    for (let i = 0; i < 12; i++) {
      const angle = (Math.PI * 2 / 12) * i + (Math.random() - 0.5) * 0.4;
      const speed = 1.5 + Math.random() * 2.5;
      particles.push({
        x: x * CELL + CELL / 2,
        y: y * CELL + CELL / 2,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        size: 3 + Math.random() * 3,
      });
    }
  }

  function updateParticles() {
    for (let p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12;
      p.life -= 0.045;
    }
    particles = particles.filter(p => p.life > 0);
  }

  function drawParticles() {
    for (let p of particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = '#f78166';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // --- Draw ---
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid dots
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        ctx.beginPath();
        ctx.arc(c * CELL + CELL / 2, r * CELL + CELL / 2, 1, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Food
    food.pulse = (food.pulse + 0.08) % (Math.PI * 2);
    const fp = 0.5 + 0.5 * Math.sin(food.pulse);
    const fr = CELL / 2 - 3 + fp * 2;
    const fx = food.x * CELL + CELL / 2;
    const fy = food.y * CELL + CELL / 2;

    ctx.save();
    const glow = ctx.createRadialGradient(fx, fy, 0, fx, fy, fr + 8);
    glow.addColorStop(0, 'rgba(247,129,102,0.35)');
    glow.addColorStop(1, 'rgba(247,129,102,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(fx, fy, fr + 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = '#f78166';
    ctx.beginPath();
    ctx.arc(fx, fy, fr, 0, Math.PI * 2);
    ctx.fill();

    // Snake
    const r = 5;
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const isHead = i === 0;
      const t = 1 - i / snake.length;
      const px = s.x * CELL + 2;
      const py = s.y * CELL + 2;
      const sz = CELL - 4;

      ctx.fillStyle = isHead ? '#3fb950' : `hsl(${120 + t * 20}, 60%, ${28 + t * 15}%)`;
      ctx.beginPath();
      ctx.roundRect(px, py, sz, sz, isHead ? r + 1 : r);
      ctx.fill();

      if (isHead) {
        // Eyes
        const ex = dir.x, ey = dir.y;
        const baseX = px + sz / 2, baseY = py + sz / 2;
        const eyeOffsets = ex === 0
          ? [{ ox: -4, oy: ey * 4 }, { ox: 4, oy: ey * 4 }]
          : [{ ox: ex * 4, oy: -4 }, { ox: ex * 4, oy: 4 }];

        ctx.fillStyle = '#0d1117';
        for (const { ox, oy } of eyeOffsets) {
          ctx.beginPath();
          ctx.arc(baseX + ox, baseY + oy, 2.2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    drawParticles();
  }

  // --- Game step ---
  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { die(); return; }
    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) { die(); return; }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += level * 10;
      spawnParticles(food.x, food.y);
      level = Math.floor(score / 100) + 1;
      speed = Math.max(60, 150 - (level - 1) * 12);
      placeFood();
      clearInterval(loop);
      loop = setInterval(tick, speed);
    } else {
      snake.pop();
    }
    updateHUD();
  }

  function tick() {
    step();
    updateParticles();
    draw();
  }

  function die() {
    running = false;
    clearInterval(loop);
    if (score > (best || 0)) best = score;
    overlayTitle.textContent = 'Game Over';
    overlayMsg.innerHTML = `You scored <span>${score}</span> points`;
    overlayBtn.textContent = 'Play Again';
    overlay.classList.remove('hidden');
    updateHUD();
  }

  function startGame() {
    init();
    overlay.classList.add('hidden');
    running = true;
    clearInterval(loop);
    loop = setInterval(tick, speed);
  }

  overlayBtn.addEventListener('click', startGame);

  // Keyboard
  document.addEventListener('keydown', e => {
    if (!running) { if (e.key === 'Enter' || e.key === ' ') startGame(); return; }
    const map = {
      ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0],
      w: [0,-1], s: [0,1], a: [-1,0], d: [1,0],
      W: [0,-1], S: [0,1], A: [-1,0], D: [1,0],
    };
    const v = map[e.key];
    if (v) { e.preventDefault(); setDir(...v); }
  });

  // D-pad
  document.getElementById('btn-up').addEventListener('click',    () => running && setDir(0, -1));
  document.getElementById('btn-down').addEventListener('click',  () => running && setDir(0, 1));
  document.getElementById('btn-left').addEventListener('click',  () => running && setDir(-1, 0));
  document.getElementById('btn-right').addEventListener('click', () => running && setDir(1, 0));

  // Initial draw
  draw();
</script>
</body>
</html>
